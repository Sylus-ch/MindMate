<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情日记 - MindMate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1 class="logo">MindMate</h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html" id="logout">返回首页</a></li>
                </ul>
            </nav>
        </header>

        <main class="diary-container">
            <h1>写心情日记</h1>
            <div class="mood-selector">
                <label>今天的心情</label>
                <div class="mood-options">
                    <div class="mood-options">
                        <button data-mood="happy">
                            <img src="diary/happy.png" alt="开心" class="mood-icon">
                            <span>开心</span>
                        </button>
                        <button data-mood="neutral">
                            <img src="diary/neutral.png" alt="一般" class="mood-icon">
                            <span>一般</span>
                        </button>
                        <button data-mood="sad">
                            <img src="diary/sad.png" alt="难过" class="mood-icon">
                            <span>难过</span>
                        </button>
                        <button data-mood="angry">
                            <img src="diary/angry.png" alt="生气" class="mood-icon">
                            <span>生气</span>
                        </button>
                        <button data-mood="anxious">
                            <img src="diary/anxious.png" alt="焦虑" class="mood-icon">
                            <span>焦虑</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <form id="diaryForm">
                <div class="form-group">
                    <label for="diaryTitle">标题</label>
                    <input type="text" id="diaryTitle" name="title" placeholder="给这一天的心情写个标题吧">
                </div>
                <div class="form-group">
                    <label for="diaryContent">内容</label>
                    <textarea id="diaryContent" name="content" rows="8" placeholder="记录下今天的心情和感想..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">保存</button>
                    <a href="calendar.html" class="btn btn-secondary">取消</a>
                </div>
            </form>
            
            <div class="back-to-calendar">
                <a href="calendar.html">返回日历</a>
            </div>
        </main>
    </div>

    <script src="js/diary.js"></script>
</body>
</html>
