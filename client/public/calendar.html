<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历 - MindMate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1 class="logo">MindMate</h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html" id="logout">返回首页</a></li>
                </ul>
            </nav>
        </header>

        <main class="calendar-container">
            <div class="calendar-header">
                <h2 class="calendar-title">2024年1月</h2>
                <div class="calendar-nav">
                    <button class="btn btn-secondary">&lt; 上月</button>
                    <button class="btn btn-secondary">本月</button>
                    <button class="btn btn-secondary">下月 &gt;</button>
                </div>
            </div>
            
            <div class="calendar-weekdays">
                <div>周一</div>
                <div>周二</div>
                <div>周三</div>
                <div>周四</div>
                <div>周五</div>
                <div>周六</div>
                <div>周日</div>
            </div>
            
            <div class="calendar-days">
                <!-- 日历日期将通过JavaScript动态生成 -->
            </div>
        </main>
    </div>

    <script src="calendar\calendar.js"></script>
</body>
</html>
